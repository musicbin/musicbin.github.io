<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>musicbin</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fb;
      color: #1f2937;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(17, 24, 39, 0.08), transparent 38%),
        linear-gradient(315deg, rgba(14, 165, 233, 0.16), transparent 42%),
        #f7f8fb;
    }

    main {
      width: min(92vw, 720px);
      padding: 48px;
      border: 1px solid rgba(31, 41, 55, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 24px 80px rgba(31, 41, 55, 0.14);
    }

    img {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 1px solid rgba(31, 41, 55, 0.14);
    }

    h1 {
      margin: 28px 0 12px;
      font-size: clamp(2rem, 6vw, 4.2rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      max-width: 56ch;
      color: #4b5563;
      font-size: 1.08rem;
      line-height: 1.7;
    }

    a {
      color: #0369a1;
      font-weight: 700;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    @media (max-width: 560px) {
      main {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <main>
    <img src="https://github.com/musicbin.png" alt="musicbin GitHub avatar">
    <h1>musicbin</h1>
    <p>这个免费站点由 GitHub Pages 托管，地址是 <a href="https://musicbin.github.io/">musicbin.github.io</a>。</p>
  </main>
</body>
</html>
